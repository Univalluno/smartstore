name: SmartStore CI/CD

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # JOB 1: INSTALACIÓN Y VERIFICACIÓN DEL MONOREPO
  setup:
    name: 🏗️ Setup Monorepo
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 📦 Install root dependencies
        run: npm ci

      - name: 📦 Install frontend dependencies
        run: cd apps/web && npm ci

      - name: 🔍 Verify project structure
        run: |
          echo "✅ Estructura del proyecto:"
          find . -name "package.json" -exec echo "   - {}" \;
          echo "📁 Contenido de apps/web:"
          ls -la apps/web/

  # JOB 2: FRONTEND CI (React + Vite)
  frontend-ci:
    name: 🎨 Frontend - CI
    runs-on: ubuntu-latest
    needs: setup
    
    defaults:
      run:
        working-directory: ./apps/web

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run linting (si existe)
        run: npm run lint || echo "⚠️ No lint script found"

      - name: 🧪 Run tests (si existen)
        run: npm test || echo "⚠️ No tests configured yet"

      - name: 🏗️ Build application
        run: npm run build

      - name: 📊 Size check
        run: |
          echo "📦 Build output:"
          ls -la dist/
          echo "📏 Bundle size:"
          du -sh dist/

      - name: 🔒 Security audit
        run: npm audit --audit-level moderate || true

      - name: 💾 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: apps/web/dist/
          retention-days: 7

  # JOB 3: QUALITY GATES
  quality-check:
    name: 📊 Quality Gates
    runs-on: ubuntu-latest
    needs: [frontend-ci]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📊 Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: build-artifacts

      - name: ✅ Quality validation
        run: |
          echo "🎯 QUALITY GATES RESULTS:"
          echo "✅ Frontend build: COMPLETED"
          echo "📁 Build artifacts saved"
          echo "🚀 Ready for deployment"
          echo ""
          echo "📈 Next steps:"
          echo "   - Add testing framework"
          echo "   - Configure ESLint"
          echo "   - Set up deployment"

  # JOB 4: DEPLOYMENT PREVIEW
  deploy-preview:
    name: 🌐 Deployment Preview
    runs-on: ubuntu-latest
    needs: [quality-check]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: preview-build

      - name: 🚀 Preview deployment info
        run: |
          echo "🌐 DEPLOYMENT PREVIEW"
          echo "Branch: ${{ github.head_ref }}"
          echo "Preview URL would be available here"
          echo "Build contents:"
          ls -la preview-build/

  # JOB 5: DEPLOY TO STAGING
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [quality-check]
    if: github.ref == 'refs/heads/develop'
    
    environment: staging
    
    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: deploy-build

      - name: 🚀 Simulate deployment
        run: |
          echo "🚀 DEPLOYING TO STAGING"
          echo "Environment: staging"
          echo "Build ready for deployment"
          echo "Add your deployment commands here:"
          echo "  - scp, rsync, docker, etc."

  # JOB 6: DEPLOY TO PRODUCTION
  deploy-production:
    name: 🎯 Deploy to Production
    runs-on: ubuntu-latest
    needs: [quality-check]
    if: github.ref == 'refs/heads/main'
    
    environment: production
    
    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: deploy-build

      - name: 🚀 Simulate production deployment
        run: |
          echo "🎯 DEPLOYING TO PRODUCTION"
          echo "Environment: production"
          echo "Add your production deployment commands:"
          echo "  - AWS S3 sync"
          echo "  - Netlify deploy"
          echo "  - Vercel deploy"
          echo "  - Custom server deployment"
